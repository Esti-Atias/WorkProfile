name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  VERSION: "1.0.0"
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/workprofile

jobs:
  # Stage 1: Basic Validation
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Validate Python files and required files
        run: |
          python -m py_compile src/*.py
          test -f Dockerfile
          test -f requirements.txt
          test -f src/init.sql

  # Stage 2: Build and Test Application
  build-and-test:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image with semver
        run: |
          docker build -t $IMAGE_NAME:latest -t $IMAGE_NAME:$VERSION .

      - name: Run container tests
        run: |
          docker run -d --name app-test -p 5000:5000 $IMAGE_NAME:latest
          sleep 10
          curl -f http://localhost:5000/health
          docker stop app-test

  # Stage 3: 3-Tier Stack Testing
  integration-test:
    runs-on: ubuntu-latest
    needs: build-and-test
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: flaskapp
          MYSQL_DATABASE: exampleDb
          MYSQL_USER: flaskapp
          MYSQL_PASSWORD: flaskapp
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Compose
        run: |
          docker-compose up -d
          sleep 15
          curl -f http://localhost:8080/health
          docker-compose down

  # Stage 4: Publish
  publish:
    runs-on: ubuntu-latest
    needs: integration-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push image to DockerHub
        run: |
          docker push $IMAGE_NAME:latest
          docker push $IMAGE_NAME:$VERSION

  # Stage 5: Kubernetes Deployment Testing
  k8s-test:
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up KinD cluster
        uses: helm/kind-action@v1.7.0

      - name: Load image into KinD
        run: |
          kind load docker-image $IMAGE_NAME:$VERSION

      - name: Replace placeholder in manifest
        run: |
          sed -i "s|YOUR_APP_IMAGE_PLACEHOLDER|$IMAGE_NAME:$VERSION|g" k8s/workprofile-deployment.yaml

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/

      - name: Wait for pods to be ready
        run: |
          kubectl wait --for=condition=ready pod -l app=workprofile --timeout=120s

      - name: Verify app is healthy
        run: |
          kubectl port-forward svc/workprofile-service 3000:5000 &
          sleep 10
          curl -f http://localhost:3000/health

  # Stage 6: Manual Deployment Instructions
  manual-instructions:
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Show manual Killercoda steps
        run: |
          echo "Manual deployment instructions:"
          echo "1. Enter Killercoda terminal"
          echo "2. Clone repo, cd into it"
          echo "3. Run: kubectl apply -f k8s/"
          echo "4. Wait for pods with: kubectl get pods"
          echo "5. Port forward: kubectl port-forward svc/workprofile-service 3000:5000"
          echo "6. Open http://localhost:3000 in browser"
